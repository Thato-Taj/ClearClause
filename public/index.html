<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearClause | AI Terms Summarizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>ClearClause</h1>
            <p>Don't just accept. Understand.</p>
        </header>

        <main>
            <section class="input-area">
                <textarea id="termsInput" placeholder="Place the Terms and Conditions here..."></textarea>
                <button id="summarizeBtn">Summarize with Gemini</button>
            </section>
            <section id="resultArea" class="hidden">
                <h2>Summary & Red Flags</h2>
                <div id="summaryOutput">
                </div>
            </section>
        </main>
        <footer>
            <p>&copy; 2026 ClearClause Project | Agile Sprint 1</p>
        </footer>
    </div>
    <script src="script.js"></script>
    
</body>
</html>
